name: Process Tagesschau Video
on:
  schedule:
    - cron: '*/30 19-23 * * *'
  workflow_dispatch:
jobs:
  synthesize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install yt-dlp
        run: sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && sudo chmod a+rx /usr/local/bin/yt-dlp
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Processing Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/process_video.py
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/summaries/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add new Tagesschau summary" && git push) 
      - name: Trigger Vercel Rebuild
        if: success()
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
